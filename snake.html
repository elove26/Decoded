<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #4ade80;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    #scoreboard {
      display: flex;
      gap: 32px;
      margin-bottom: 14px;
      font-size: 0.95rem;
      color: #aaa;
    }

    #scoreboard span { color: #fff; font-weight: bold; }

    #level-display {
      font-size: 0.85rem;
      color: #facc15;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    #canvas {
      border: 3px solid #4ade80;
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(74, 222, 128, 0.3);
      display: block;
    }

    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(15,15,26,0.85);
      width: 100%;
      height: 100%;
      border-radius: 2px;
    }

    #message {
      font-size: 2rem;
      font-weight: bold;
      color: #4ade80;
      letter-spacing: 2px;
    }

    #sub-message { font-size: 0.95rem; color: #aaa; }
    #final-score { font-size: 1.1rem; color: #facc15; }

    #start-btn {
      margin-top: 6px;
      padding: 10px 28px;
      background: #4ade80;
      color: #1a1a2e;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    #start-btn:hover { background: #86efac; }

    #controls {
      margin-top: 14px;
      font-size: 0.78rem;
      color: #444;
      text-align: center;
      line-height: 1.8;
    }

    .wrapper { position: relative; }
  </style>
</head>
<body>
  <h1>Snake</h1>
  <div id="scoreboard">
    Score: <span id="score">0</span>
    &nbsp;|&nbsp;
    Best: <span id="high-score">0</span>
  </div>
  <div id="level-display">LEVEL <span id="level">1</span></div>
  <div class="wrapper">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="overlay">
      <div id="message">SNAKE</div>
      <div id="sub-message">Arrow keys or WASD to move</div>
      <div id="final-score"></div>
      <button id="start-btn">Start Game</button>
    </div>
  </div>
  <div id="controls">
    Arrow Keys / WASD &nbsp;|&nbsp; P = pause &nbsp;|&nbsp; Gold food = bonus points!
  </div>

  <script>
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const message = document.getElementById('message');
    const subMessage  = document.getElementById('sub-message');
    const finalScore  = document.getElementById('final-score');
    const startBtn    = document.getElementById('start-btn');
    const scoreEl     = document.getElementById('score');
    const highScoreEl = document.getElementById('high-score');
    const levelEl     = document.getElementById('level');

    const GRID = 20;
    const COLS = canvas.width  / GRID;
    const ROWS = canvas.height / GRID;

    const BASE_TICK = 130;
    const MIN_TICK  = 55;

    let snake, dir, nextDir, food, bonus;
    let score, highScore, level, paused, gameOver, intervalId;
    let particles = [];
    let bonusTimer = 0;
    let bonusTick  = 0;
    let frameId;

    highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
    highScoreEl.textContent = highScore;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function beep(freq, duration, type = 'square', vol = 0.15) {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playEat()   { beep(440, 0.08); beep(660, 0.08); }
    function playBonus() { beep(660, 0.08); beep(880, 0.08); beep(1100, 0.12); }
    function playDead()  { beep(220, 0.15, 'sawtooth'); beep(110, 0.3, 'sawtooth'); }

    function randomCell(exclude = []) {
      let cell;
      do {
        cell = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (exclude.some(s => s.x === cell.x && s.y === cell.y));
      return cell;
    }

    function currentTickMs() {
      return Math.max(MIN_TICK, BASE_TICK - Math.floor(score / 5) * 8);
    }

    function getLevel() {
      return Math.floor(score / 5) + 1;
    }

    function spawnParticles(cx, cy, color) {
      for (let i = 0; i < 10; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 2.5;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          color,
          size: 2 + Math.random() * 3,
        });
      }
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y,     x + w, y + r,     r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x,     y + h, x,       y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x,     y,     x + r,   y,         r);
      ctx.closePath();
    }

    function init() {
      const startX = Math.floor(COLS / 2);
      const startY = Math.floor(ROWS / 2);
      snake   = [{ x: startX, y: startY }, { x: startX-1, y: startY }, { x: startX-2, y: startY }];
      dir     = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score   = 0;
      level   = 1;
      paused  = false;
      gameOver = false;
      bonus   = null;
      bonusTimer = 0;
      bonusTick  = 0;
      particles  = [];
      scoreEl.textContent = 0;
      levelEl.textContent = 1;
      food = randomCell(snake);
      overlay.style.display = 'none';
    }

    function step() {
      if (paused || gameOver) return;

      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { endGame(); return; }
      if (snake.some(s => s.x === head.x && s.y === head.y))             { endGame(); return; }

      snake.unshift(head);

      let ate = false;

      if (head.x === food.x && head.y === food.y) {
        score++;
        ate = true;
        playEat();
        spawnParticles(food.x * GRID + GRID/2, food.y * GRID + GRID/2, '#f87171');
        food = randomCell(snake);
        if (!bonus && Math.random() < 0.2) {
          bonus = { ...randomCell(snake), value: 3, ttl: 40 };
          bonusTick = 0;
        }
      } else if (bonus && head.x === bonus.x && head.y === bonus.y) {
        score += bonus.value;
        ate = true;
        playBonus();
        spawnParticles(bonus.x * GRID + GRID/2, bonus.y * GRID + GRID/2, '#facc15');
        bonus = null;
      } else {
        snake.pop();
      }

      if (ate) {
        scoreEl.textContent = score;
        const newLevel = getLevel();
        if (newLevel !== level) {
          level = newLevel;
          levelEl.textContent = level;
          restartInterval();
        }
        if (score > highScore) {
          highScore = score;
          highScoreEl.textContent = highScore;
          localStorage.setItem('snakeHighScore', highScore);
        }
      }

      if (bonus) {
        bonusTick++;
        if (bonusTick >= bonus.ttl) bonus = null;
      }
    }

    function restartInterval() {
      clearInterval(intervalId);
      intervalId = setInterval(step, currentTickMs());
    }

    function draw() {
      ctx.fillStyle = '#0f0f1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x*GRID, 0); ctx.lineTo(x*GRID, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y*GRID); ctx.lineTo(canvas.width, y*GRID); ctx.stroke();
      }

      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.9;
        p.vy *= 0.9;
        p.life -= 0.06;
      });
      ctx.globalAlpha = 1;

      const pulse = 0.85 + 0.15 * Math.sin(Date.now() / 180);
      const fr = (GRID / 2 - 2) * pulse;
      ctx.fillStyle = '#f87171';
      ctx.shadowColor = '#f87171';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(food.x * GRID + GRID/2, food.y * GRID + GRID/2, fr, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      if (bonus) {
        const fade = Math.sin(Date.now() / 120);
        ctx.globalAlpha = 0.6 + 0.4 * fade;
        ctx.fillStyle = '#facc15';
        ctx.shadowColor = '#facc15';
        ctx.shadowBlur = 14;
        drawStar(bonus.x * GRID + GRID/2, bonus.y * GRID + GRID/2, 5, GRID/2 - 1, GRID/4);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        const pct = 1 - bonusTick / bonus.ttl;
        ctx.fillStyle = `hsl(${pct * 50}, 100%, 55%)`;
        ctx.fillRect(bonus.x * GRID + 1, bonus.y * GRID + GRID - 3, (GRID - 2) * pct, 2);
      }

      snake.forEach((seg, i) => {
        const x = seg.x * GRID, y = seg.y * GRID;
        if (i === 0) {
          ctx.fillStyle = '#4ade80';
          ctx.shadowColor = '#4ade80';
          ctx.shadowBlur = 6;
        } else {
          const ratio = 1 - i / snake.length;
          const g = Math.floor(160 + ratio * 62);
          ctx.fillStyle = `rgb(30,${g},80)`;
          ctx.shadowBlur = 0;
        }
        roundRect(x+1, y+1, GRID-2, GRID-2, 4);
        ctx.fill();
        ctx.shadowBlur = 0;

        if (i === 0) {
          ctx.fillStyle = '#0f0f1a';
          const e = 2.5;
          if      (dir.x === 1)  { eye(x+GRID-5, y+5, e);      eye(x+GRID-5, y+GRID-5, e); }
          else if (dir.x === -1) { eye(x+5,      y+5, e);      eye(x+5,      y+GRID-5, e); }
          else if (dir.y === -1) { eye(x+5,      y+5, e);      eye(x+GRID-5, y+5,      e); }
          else                   { eye(x+5,      y+GRID-5, e); eye(x+GRID-5, y+GRID-5, e); }
        }
      });

      frameId = requestAnimationFrame(draw);
    }

    function eye(x, y, r) {
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    }

    function drawStar(cx, cy, spikes, outerR, innerR) {
      let rot = (Math.PI / 2) * 3;
      const step = Math.PI / spikes;
      ctx.beginPath();
      ctx.moveTo(cx, cy - outerR);
      for (let i = 0; i < spikes; i++) {
        ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
        rot += step;
        ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
        rot += step;
      }
      ctx.lineTo(cx, cy - outerR);
      ctx.closePath();
    }

    function endGame() {
      gameOver = true;
      clearInterval(intervalId);
      playDead();
      message.textContent = 'GAME OVER';
      subMessage.textContent = `Level ${level} reached`;
      finalScore.textContent = `Score: ${score}`;
      startBtn.textContent = 'Play Again';
      overlay.style.display = 'flex';
    }

    function startGame() {
      cancelAnimationFrame(frameId);
      clearInterval(intervalId);
      init();
      intervalId = setInterval(step, currentTickMs());
      frameId = requestAnimationFrame(draw);
    }

    startBtn.addEventListener('click', () => {
      audioCtx.resume();
      startGame();
    });

    document.addEventListener('keydown', e => {
      audioCtx.resume();
      switch (e.key) {
        case 'ArrowUp':    case 'w': case 'W': if (dir.y !==  1) nextDir = {x:0, y:-1}; break;
        case 'ArrowDown':  case 's': case 'S': if (dir.y !== -1) nextDir = {x:0, y: 1}; break;
        case 'ArrowLeft':  case 'a': case 'A': if (dir.x !==  1) nextDir = {x:-1,y: 0}; break;
        case 'ArrowRight': case 'd': case 'D': if (dir.x !== -1) nextDir = {x: 1,y: 0}; break;
        case 'p': case 'P': if (!gameOver) paused = !paused; break;
      }
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
    });

    startGame();
  </script>
</body>
</html>
